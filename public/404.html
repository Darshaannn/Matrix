<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - You've taken the wrong pill...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020617;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #ffffff, #ffffff1a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        h2 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin: 20px 0;
        }

        p {
            color: #94a3b8;
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .pills {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 40px;
        }

        .pill-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .pill {
            width: 50px;
            height: 120px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .pill::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .pill-red {
            background-color: #dc2626;
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.4);
        }

        .pill-red:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 50px rgba(220, 38, 38, 0.6);
        }

        .pill-blue {
            background-color: #2563eb;
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.4);
        }

        .pill-blue:hover {
            transform: scale(1.1) rotate(-5deg);
            box-shadow: 0 0 50px rgba(37, 99, 235, 0.6);
        }

        .pill-label {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #ef4444;
        }

        .pill-label-blue {
            color: #3b82f6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .back-link {
            display: block;
            margin-top: 60px;
            color: #f59e0b;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.1em;
        }

        /* Matrix Rain Background Effect */
        .rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            filter: blur(80px);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="rain" id="matrix-rain"></div>
    
    <div class="container">
        <h1>404</h1>
        <h2>You've taken the wrong pill...</h2>
        <p>The URL you're looking for doesn't exist in this version of the Matrix. Wake up and choose your path.</p>
        
        <div class="pills">
            <div class="pill-container">
                <a href="/">
                    <div class="pill pill-red"></div>
                </a>
                <span class="pill-label">Return Home</span>
            </div>
            
            <div class="pill-container">
                <div class="pill pill-blue" onclick="window.location.reload()"></div>
                <span class="pill-label pill-label-blue">Retry Path</span>
            </div>
        </div>

        <a href="/" class="back-link">← Exit the void</a>
    </div>

    <script>
        // Simple matrix rain simulation
        const rainContainer = document.getElementById('matrix-rain');
        const columns = Math.floor(window.innerWidth / 30);
        
        for (let i = 0; i < columns; i++) {
            const drop = document.createElement('div');
            drop.style.position = 'absolute';
            drop.style.left = i * 30 + 'px';
            drop.style.color = '#10b981';
            drop.style.fontFamily = 'monospace';
            drop.style.fontSize = '12px';
            drop.style.writingMode = 'vertical-rl';
            drop.innerText = '010110010111010110001010110110110101';
            
            const duration = Math.random() * 5 + 5;
            const delay = Math.random() * 5;
            
            drop.style.animation = `fall ${duration}s linear ${delay}s infinite`;
            rainContainer.appendChild(drop);
        }

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fall {
                from { transform: translateY(-500px); opacity: 0; }
                20% { opacity: 1; }
                80% { opacity: 1; }
                to { transform: translateY(1200px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
